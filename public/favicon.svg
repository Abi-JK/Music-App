<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g1" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#006878"/>
      <stop offset="50%" stop-color="#00b0cc"/>
      <stop offset="100%" stop-color="#00eaff"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#004d5a"/>
      <stop offset="100%" stop-color="#0090aa"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080c18"/>
      <stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
  </defs>

  <!-- Rounded dark background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle outer ring -->
  <circle cx="256" cy="268" r="195" fill="none" stroke="#00d4e8" stroke-width="2" opacity="0.08"/>

  <!-- Equalizer bars — 7 bars with rounded tops -->
  <rect x="100" y="280" width="32" height="110" rx="16" fill="url(#g2)"/>
  <rect x="148" y="220" width="32" height="170" rx="16" fill="url(#g1)"/>
  <rect x="196" y="160" width="32" height="230" rx="16" fill="url(#g1)"/>
  <rect x="244" y="120" width="32" height="270" rx="16" fill="url(#g1)"/>
  <rect x="292" y="170" width="32" height="220" rx="16" fill="url(#g1)"/>
  <rect x="340" y="230" width="32" height="160" rx="16" fill="url(#g1)"/>
  <rect x="388" y="290" width="32" height="100" rx="16" fill="url(#g2)"/>

  <!-- Subtle glow at center -->
  <circle cx="260" cy="300" r="60" fill="#00d4e8" opacity="0.04"/>
</svg>
