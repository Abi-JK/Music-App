<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22eaff"/>
      <stop offset="100%" stop-color="#00a0b4"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="512" height="512" rx="96" fill="#0a0e1a"/>

  <!-- Headphone band — thick and bold -->
  <path d="M140 290 C140 155, 372 155, 372 290"
        fill="none" stroke="url(#g)" stroke-width="30" stroke-linecap="round"/>

  <!-- Left ear cup — big and solid -->
  <rect x="110" y="260" width="62" height="86" rx="18" fill="url(#g)"/>

  <!-- Right ear cup — big and solid -->
  <rect x="340" y="260" width="62" height="86" rx="18" fill="url(#g)"/>

  <!-- Soundwave bars — 5 bars, bold -->
  <rect x="215" y="278" width="10" height="36" rx="5" fill="#22eaff" opacity="0.7"/>
  <rect x="235" y="268" width="10" height="56" rx="5" fill="#22eaff" opacity="0.85"/>
  <rect x="255" y="260" width="10" height="72" rx="5" fill="#00d4e8"/>
  <rect x="275" y="268" width="10" height="56" rx="5" fill="#22eaff" opacity="0.85"/>
  <rect x="295" y="278" width="10" height="36" rx="5" fill="#22eaff" opacity="0.7"/>
</svg>
