[build]
  publish = "dist"
  command = "npm run build"

# ── Security headers ─────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "autoplay=(self), fullscreen=(self)"

# ── Cache static assets aggressively ─────────────────────
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Service worker + manifest must revalidate ────────────
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# ── JioSaavn proxy → handled by Netlify Edge Function ────
# The edge function (netlify/edge-functions/saavn-proxy.ts) injects the
# Referer / User-Agent headers that JioSaavn requires. Plain [[redirects]]
# CANNOT set request headers, which is why the previous config broke
# streams, downloads, and search in production.
[[edge_functions]]
  function = "saavn-proxy"
  path = "/saavn-api"

[[edge_functions]]
  function = "saavn-proxy"
  path = "/saavn-api/*"

[[edge_functions]]
  function = "saavn-proxy"
  path = "/saavn-stream/*"

[[edge_functions]]
  function = "saavn-proxy"
  path = "/saavn-search/*"

# ── SPA fallback — must be LAST ──────────────────────────
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
