[build]
  publish = "dist"
  command = "npm run build"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "autoplay=(self), fullscreen=(self)"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Service worker must not be cached
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ── API Proxy Redirects ──────────────────────────────────
# These replicate the Vite dev proxies for production

# JioSaavn official API (song details + auth token)
[[redirects]]
  from = "/saavn-api"
  to = "https://www.jiosaavn.com/api.php"
  status = 200
  force = true

# Vercel JioSaavn API wrapper (search + lyrics)
[[redirects]]
  from = "/saavn-search/*"
  to = "https://jiosaavn-api-beta.vercel.app/:splat"
  status = 200
  force = true

# JioSaavn CDN stream proxy
[[redirects]]
  from = "/saavn-stream/*"
  to = "https://web.saavncdn.com/:splat"
  status = 200
  force = true

# SPA fallback — must be LAST
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
